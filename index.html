<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランドルト環 視力検査</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- イントロオーバーレイ -->
<div id="intro-overlay">
  <div id="intro-box">
    <p id="intro-text">簡易視力検査！<br>カメラに向かってランドルト環の穴が空いている方を<br>指さしてください！</p>
    <button id="start-btn">スタート</button>
  </div>
</div>

<h1>👁 ランドルト環 視力検査アシスト</h1>

<div id="main-area">
  <div id="screen-row">
    <!-- 視力検査表（複数行のランドルト環） -->
    <div id="chart-frame-wrap">
      <div id="chart-frame">
        <canvas id="chart-canvas"></canvas>
      </div>
      <div id="screen-stand"></div>
    </div>

    <!-- カメラ映像 -->
    <div id="camera-side">
      <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="hand-canvas"></canvas>
        <div id="direction-indicator">
          <div class="dir-zone" id="zone-up">   <div class="dir-label">上</div></div>
          <div class="dir-zone" id="zone-down"> <div class="dir-label">下</div></div>
          <div class="dir-zone" id="zone-left"> <div class="dir-label">左</div></div>
          <div class="dir-zone" id="zone-right"><div class="dir-label">右</div></div>
        </div>
      </div>
      <div id="status">カメラ起動中…</div>
    </div>
  </div>

  <!-- 回答表示 -->
  <div id="answer-giant"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
